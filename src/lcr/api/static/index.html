<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCR · Literature Citation-RAG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .collection-node[data-collapsed="true"] + ul { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-900">
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center sticky top-0 z-10 shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg">
                <i class="fas fa-book-open"></i>
            </div>
            <h1 class="text-lg font-bold tracking-tight">LCR <span class="text-blue-600">· Literature Citation-RAG</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <span id="selected-summary" class="text-sm font-medium text-slate-500">Selected: 0 papers</span>
            <button id="ask-btn-top" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-md text-sm font-semibold transition shadow-sm">
                Ask System
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- 左侧目录树 -->
        <aside class="w-80 border-r border-slate-200 bg-white flex flex-col">
            <div class="p-4 space-y-4">
                <div class="relative">
                    <input type="text" id="tree-search" placeholder="Search title or DOI..." 
                        class="w-full bg-slate-100 border-none rounded-md py-2 pl-9 pr-3 text-sm focus:ring-2 focus:ring-blue-500 transition">
                    <i class="fas fa-search absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                </div>
                <button id="load-zotero-btn" class="w-full border border-slate-200 hover:bg-slate-50 py-1.5 rounded-md text-sm font-medium transition flex items-center justify-center space-x-2">
                    <i class="fas fa-sync-alt text-slate-500"></i>
                    <span>Reload Zotero Library</span>
                </button>
            </div>
            
            <div id="tree-container" class="flex-1 overflow-y-auto p-2 custom-scrollbar">
                <!-- 目录树将渲染在这里 -->
                <div id="tree-loading" class="flex flex-col items-center justify-center h-40 text-slate-400">
                    <i class="fas fa-circle-notch fa-spin text-2xl mb-2"></i>
                    <span class="text-xs">Loading Zotero...</span>
                </div>
            </div>
        </aside>

        <!-- 右侧问答区域 -->
        <section class="flex-1 flex flex-col bg-slate-50 overflow-hidden">
            <!-- 问题输入区 -->
            <div class="p-6 bg-white border-b border-slate-200">
                <div class="max-w-3xl mx-auto">
                    <div class="mb-4">
                        <textarea id="question" rows="3" 
                            class="w-full border border-slate-200 rounded-xl p-4 text-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none shadow-sm"
                            placeholder="Ask a scientific question based on selected literature..."></textarea>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-xs text-slate-400 italic">
                            Tip: Select papers on the left to restrict search scope.
                        </div>
                        <button id="ask-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-lg font-bold transition shadow-md flex items-center space-x-2">
                            <span>Get Answer</span>
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 结果显示区 -->
            <div id="result-area" class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-slate-400 space-y-4">
                    <i class="fas fa-microscope text-6xl opacity-20"></i>
                    <p class="text-lg">Select literature and ask a question to begin analysis.</p>
                </div>

                <div id="error-box" class="hidden max-w-3xl mx-auto p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm mb-6 flex items-start space-x-3">
                    <i class="fas fa-exclamation-circle mt-0.5"></i>
                    <span id="error-msg"></span>
                </div>

                <div id="answer-container" class="hidden max-w-4xl mx-auto space-y-8 pb-12">
                    <article class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex items-center space-x-2 mb-4 text-blue-600">
                            <i class="fas fa-lightbulb"></i>
                            <h2 class="font-bold uppercase tracking-wider text-sm">Synthetic Answer</h2>
                        </div>
                        <div id="answer-text" class="text-slate-800 text-lg leading-relaxed whitespace-pre-wrap"></div>
                    </article>

                    <div class="space-y-4">
                        <div class="flex items-center space-x-2 text-slate-500 px-2">
                            <i class="fas fa-quote-left text-xs"></i>
                            <h2 class="font-bold uppercase tracking-wider text-xs">Supporting Evidence</h2>
                        </div>
                        <div id="citations-list" class="grid grid-cols-1 gap-4"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // State
        let collections = [];
        let selectedDois = new Set();
        let searchKeyword = '';

        // DOM Elements
        const treeContainer = document.getElementById('tree-container');
        const treeSearch = document.getElementById('tree-search');
        const loadZoteroBtn = document.getElementById('load-zotero-btn');
        const askBtn = document.getElementById('ask-btn');
        const askBtnTop = document.getElementById('ask-btn-top');
        const questionInput = document.getElementById('question');
        const resultArea = document.getElementById('result-area');
        const welcomeScreen = document.getElementById('welcome-screen');
        const answerContainer = document.getElementById('answer-container');
        const answerText = document.getElementById('answer-text');
        const citationsList = document.getElementById('citations-list');
        const errorBox = document.getElementById('error-box');
        const errorMsg = document.getElementById('error-msg');
        const selectedSummary = document.getElementById('selected-summary');

        // Initialize
        fetchCollections();

        // Events
        loadZoteroBtn.addEventListener('click', fetchCollections);
        treeSearch.addEventListener('input', (e) => {
            searchKeyword = e.target.value.toLowerCase();
            renderTree();
        });

        [askBtn, askBtnTop].forEach(btn => btn.addEventListener('click', handleAsk));

        async function fetchCollections() {
            treeContainer.innerHTML = '<div class="flex flex-col items-center justify-center h-40 text-slate-400"><i class="fas fa-circle-notch fa-spin text-2xl mb-2"></i><span class="text-xs">Connecting to Zotero...</span></div>';
            try {
                const res = await fetch('/zotero/collections');
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed to fetch Zotero data');
                collections = data.collections;
                renderTree();
            } catch (err) {
                treeContainer.innerHTML = `<div class="p-4 text-red-500 text-xs text-center"><i class="fas fa-exclamation-triangle mb-2 text-lg"></i><br>${err.message}</div>`;
            }
        }

        function renderTree() {
            if (collections.length === 0) return;
            
            treeContainer.innerHTML = '';
            
            // Build map for nested tree
            const colMap = {};
            collections.forEach(c => colMap[c.id] = { ...c, children: [], filteredItems: [] });
            
            const rootCollections = [];
            collections.forEach(c => {
                const node = colMap[c.id];
                // Filter items
                node.filteredItems = c.items.filter(item => 
                    item.title.toLowerCase().includes(searchKeyword) || 
                    item.doi.toLowerCase().includes(searchKeyword)
                );
                
                if (c.parent_id && colMap[c.parent_id]) {
                    colMap[c.parent_id].children.push(node);
                } else {
                    rootCollections.push(node);
                }
            });

            const fragment = document.createDocumentFragment();
            rootCollections.forEach(col => {
                const colEl = createCollectionEl(col);
                if (colEl) fragment.appendChild(colEl);
            });

            if (fragment.children.length === 0) {
                treeContainer.innerHTML = '<div class="p-8 text-center text-slate-400 text-xs italic">No matching results found</div>';
            } else {
                treeContainer.appendChild(fragment);
            }
        }

        function createCollectionEl(col) {
            // Recursively check if children have items
            const hasVisibleItems = col.filteredItems.length > 0 || col.children.some(child => hasVisibleItemsRecursive(child));
            if (searchKeyword && !hasVisibleItems) return null;

            const li = document.createElement('div');
            li.className = 'mb-1';
            
            const header = document.createElement('div');
            header.className = 'collection-node flex items-center group py-1 px-2 rounded hover:bg-slate-50 cursor-pointer transition';
            header.dataset.collapsed = "false";
            
            const toggleIcon = document.createElement('i');
            toggleIcon.className = 'fas fa-chevron-down w-4 text-slate-400 text-[10px] transition-transform';
            
            const folderIcon = document.createElement('i');
            folderIcon.className = 'fas fa-folder text-amber-400 mr-2';
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'flex-1 text-sm font-medium truncate';
            nameSpan.textContent = `${col.name}`;
            
            const countSpan = document.createElement('span');
            countSpan.className = 'text-[10px] text-slate-400 ml-2 bg-slate-100 px-1.5 py-0.5 rounded-full';
            countSpan.textContent = col.items.length;

            const bulkSelectBtn = document.createElement('button');
            bulkSelectBtn.className = 'hidden group-hover:block ml-2 text-blue-500 hover:text-blue-700 text-[10px]';
            bulkSelectBtn.textContent = 'All';
            bulkSelectBtn.onclick = (e) => {
                e.stopPropagation();
                const allChecked = col.items.every(item => selectedDois.has(item.doi));
                col.items.forEach(item => {
                    if (item.has_pdf) {
                        if (allChecked) selectedDois.delete(item.doi);
                        else selectedDois.add(item.doi);
                    }
                });
                renderTree();
                updateSummary();
            };

            header.appendChild(toggleIcon);
            header.appendChild(folderIcon);
            header.appendChild(nameSpan);
            header.appendChild(countSpan);
            header.appendChild(bulkSelectBtn);

            header.onclick = () => {
                const isCollapsed = header.dataset.collapsed === "true";
                header.dataset.collapsed = (!isCollapsed).toString();
                toggleIcon.style.transform = isCollapsed ? 'rotate(0deg)' : 'rotate(-90deg)';
            };

            const ul = document.createElement('ul');
            ul.className = 'ml-4 mt-1 border-l border-slate-100 pl-2';

            // Render Sub-collections
            col.children.forEach(child => {
                const childEl = createCollectionEl(child);
                if (childEl) ul.appendChild(childEl);
            });

            // Render Items
            col.filteredItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `flex items-start py-1.5 px-2 rounded transition ${item.has_pdf ? 'hover:bg-blue-50 cursor-pointer' : 'opacity-40'}`;
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'mt-1 mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500';
                checkbox.checked = selectedDois.has(item.doi);
                checkbox.disabled = !item.has_pdf;
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'flex-1 min-w-0';
                
                const title = document.createElement('div');
                title.className = 'text-[13px] leading-tight break-words font-medium text-slate-700';
                title.textContent = item.title;
                
                const meta = document.createElement('div');
                meta.className = 'text-[10px] text-slate-400 mt-1 flex justify-between';
                meta.innerHTML = `<span><i class="far fa-calendar-alt mr-1"></i>${item.year}</span> <span class="truncate ml-2">${item.doi}</span>`;

                itemDiv.onclick = (e) => {
                    if (item.has_pdf && e.target !== checkbox) {
                        checkbox.checked = !checkbox.checked;
                        if (checkbox.checked) selectedDois.add(item.doi);
                        else selectedDois.delete(item.doi);
                        updateSummary();
                    }
                };

                checkbox.onchange = () => {
                    if (checkbox.checked) selectedDois.add(item.doi);
                    else selectedDois.delete(item.doi);
                    updateSummary();
                };

                itemDiv.appendChild(checkbox);
                itemDiv.appendChild(infoDiv);
                infoDiv.appendChild(title);
                infoDiv.appendChild(meta);
                ul.appendChild(itemDiv);
            });

            li.appendChild(header);
            li.appendChild(ul);
            return li;
        }

        function hasVisibleItemsRecursive(col) {
            if (col.filteredItems.length > 0) return true;
            return col.children.some(child => hasVisibleItemsRecursive(child));
        }

        function updateSummary() {
            selectedSummary.textContent = `Selected: ${selectedDois.size} papers`;
        }

        async function handleAsk() {
            const question = questionInput.value.trim();
            if (!question) return;
            
            // Validation
            if (selectedDois.size === 0) {
                alert("Please select at least one paper from the left library.");
                return;
            }

            // UI State
            askBtn.disabled = true;
            askBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i><span>Analyzing...</span>';
            errorBox.classList.add('hidden');
            welcomeScreen.classList.add('hidden');
            answerContainer.classList.add('hidden');

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        question, 
                        dois: Array.from(selectedDois)
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'The synthesis engine encountered an error.');

                answerText.textContent = data.answer;
                citationsList.innerHTML = '';
                
                data.citations.forEach((cit, index) => {
                    const card = document.createElement('div');
                    card.className = 'bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition';
                    card.innerHTML = `
                        <details class="group">
                            <summary class="flex items-center justify-between p-4 cursor-pointer list-none">
                                <div class="flex items-center space-x-3">
                                    <span class="flex items-center justify-center bg-blue-100 text-blue-700 w-6 h-6 rounded text-[10px] font-bold">#${index + 1}</span>
                                    <h3 class="font-bold text-sm text-slate-700 truncate max-w-lg">${cit.source}</h3>
                                </div>
                                <i class="fas fa-chevron-down text-slate-300 group-open:rotate-180 transition-transform"></i>
                            </summary>
                            <div class="px-4 pb-4 border-t border-slate-50 pt-3">
                                <div class="text-xs text-slate-600 bg-slate-50 p-3 rounded-lg border-l-4 border-blue-400 italic">
                                    "${cit.text}..."
                                </div>
                            </div>
                        </details>
                    `;
                    citationsList.appendChild(card);
                });

                answerContainer.classList.remove('hidden');
            } catch (err) {
                errorMsg.textContent = err.message;
                errorBox.classList.remove('hidden');
                welcomeScreen.classList.remove('hidden');
            } finally {
                askBtn.disabled = false;
                askBtn.innerHTML = '<span>Get Answer</span><i class="fas fa-paper-plane"></i>';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCR · Literature Citation-RAG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        #settings-drawer { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #settings-drawer.open { transform: translateX(0); }
        #drawer-overlay { transition: opacity 0.3s ease-in-out; pointer-events: none; opacity: 0; }
        #drawer-overlay.open { pointer-events: auto; opacity: 1; }
        #answer-text h1,#answer-text h2,#answer-text h3 { font-weight:700; margin:1em 0 .5em; }
        #answer-text p { margin-bottom:.75em; }
        #answer-text strong { font-weight:700; }
        #answer-text ul,#answer-text ol { margin-left:1.5em; margin-bottom:.75em; list-style:disc; }
        #answer-text li { margin-bottom:.25em; }
        .collection-node[data-collapsed="true"] + ul { display: none; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans text-slate-900 overflow-hidden">
    <div id="drawer-overlay" class="fixed inset-0 bg-black/20 z-40 transition-opacity"></div>

    <!-- Settings Drawer -->
    <div id="settings-drawer" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-50 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-lg font-bold flex items-center"><i class="fas fa-cog mr-2 text-slate-400"></i>Settings</h2>
            <button id="close-settings" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times"></i></button>
        </div>

        <div class="flex-1 space-y-6 overflow-y-auto pr-2 custom-scrollbar">
            <section class="space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest border-b pb-1">LLM Configuration</h3>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Provider</label>
                    <select id="setting-provider" class="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-2">
                        <option value="deepseek">DeepSeek</option>
                        <option value="kimi">Kimi (Moonshot)</option>
                        <option value="claude">Anthropic Claude</option>
                        <option value="openai">OpenAI</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="custom">Custom / Other</option>
                    </select>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Model</label>
                    <select id="setting-model" class="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    <input type="text" id="setting-model-custom" placeholder="e.g. openai/my-model"
                        class="hidden w-full mt-2 border border-slate-200 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <label class="block text-xs font-bold text-slate-500 mb-1 mt-3">
                        Summary Model <span class="font-normal text-slate-400 ml-1">for evidence scoring</span>
                    </label>
                    <select id="setting-summary-provider" class="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-2">
                        <option value="same">— Same as main model —</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="kimi">Kimi (Moonshot)</option>
                        <option value="openai">OpenAI</option>
                    </select>
                    <select id="setting-summary-model" class="hidden w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">API Key</label>
                    <input type="password" id="setting-key" placeholder="Leave blank to use .env"
                        class="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">API Base URL</label>
                    <input type="text" id="setting-base" placeholder="Optional custom endpoint"
                        class="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </section>

            <section class="space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest border-b pb-1">Retrieval Settings</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Evidence K</label>
                        <input type="number" id="setting-k" value="50" min="5" max="200"
                            class="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Max Sources</label>
                        <input type="number" id="setting-sources" value="5" min="1" max="10"
                            class="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </section>
        </div>

        <div class="pt-6 border-t mt-6 space-y-3">
            <button id="test-llm-btn" class="w-full border border-slate-200 hover:bg-slate-50 text-slate-700 py-2 rounded-md text-sm font-bold transition flex items-center justify-center space-x-2">
                <i class="fas fa-plug text-slate-400"></i><span>Test Connection</span>
            </button>
            <div id="test-status" class="text-[10px] text-center hidden break-words p-2 rounded bg-slate-50"></div>
            <button id="apply-settings" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-2 rounded-md text-sm font-bold transition">Apply Settings</button>
        </div>
    </div>

    <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center sticky top-0 z-10 shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg"><i class="fas fa-book-open"></i></div>
            <h1 class="text-lg font-bold tracking-tight">LCR <span class="text-blue-600">· Literature Citation-RAG</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2 border-r pr-4 border-slate-200">
                <span id="selected-summary" class="text-sm font-medium text-slate-500">Auto-retrieval mode</span>
                <button id="clear-selection-btn" class="text-xs text-red-500 hover:text-red-700 hover:underline transition hidden">Clear Selection</button>
            </div>
            <button id="open-settings" class="text-slate-400 hover:text-slate-600 p-2 transition" title="Settings"><i class="fas fa-cog text-xl"></i></button>
        </div>
    </header>

    <main class="flex-1 min-h-0 flex overflow-hidden">
        <!-- Zotero Tree -->
        <aside class="w-80 border-r border-slate-200 bg-white flex flex-col">
            <div class="p-4 space-y-4">
                <div class="relative">
                    <input type="text" id="tree-search" placeholder="Search title or DOI..." 
                        class="w-full bg-slate-100 border-none rounded-md py-2 pl-9 pr-3 text-sm focus:ring-2 focus:ring-blue-500 transition">
                    <i class="fas fa-search absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                </div>
            </div>
            <div id="tree-container" class="flex-1 overflow-y-auto p-2 custom-scrollbar">
                <div id="tree-loading" class="flex flex-col items-center justify-center h-40 text-slate-400">
                    <i class="fas fa-circle-notch fa-spin text-2xl mb-2"></i><span class="text-xs">Loading Zotero...</span>
                </div>
            </div>
        </aside>

        <!-- Chat Area -->
        <section class="flex-1 min-h-0 flex flex-col bg-slate-50 overflow-hidden">
            <div class="p-6 bg-white border-b border-slate-200">
                <div class="max-w-3xl mx-auto">
                    <div class="mb-4">
                        <textarea id="question" rows="3"
                            class="w-full border border-slate-200 rounded-xl p-4 text-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none shadow-sm"
                            placeholder="Ask a scientific question..."></textarea>
                    </div>

                    <div class="flex items-center space-x-2 mb-3">
                        <select id="prompt-template-select"
                            class="border border-slate-200 rounded-md px-3 py-1.5 text-xs text-slate-600 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">Loading templates...</option>
                        </select>
                        <button id="edit-prompt-btn" class="text-slate-400 hover:text-slate-600 transition text-xs px-2 py-1.5 border border-slate-200 rounded-md bg-white" title="Edit template"><i class="fas fa-pen"></i></button>
                    </div>

                    <div id="prompt-edit-panel" class="hidden mb-3">
                        <textarea id="prompt-content-input" rows="4" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-xs font-mono text-slate-700"></textarea>
                    </div>

                    <div class="flex justify-between items-center">
                        <div class="flex space-x-2">
                            <div id="llm-badge" class="px-2 py-1 bg-slate-100 rounded text-[10px] text-slate-500 font-mono">Model: deepseek/deepseek-chat</div>
                            <div id="retrieval-badge" class="px-2 py-1 bg-slate-100 rounded text-[10px] text-slate-400 font-mono">Auto-retrieval</div>
                        </div>
                        <button id="ask-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-2.5 rounded-lg font-bold shadow-md flex items-center space-x-2">
                            <i class="fas fa-search"></i><span>Ask Research Brain</span>
                        </button>
                    </div>
                </div>
            </div>

            <div id="result-area" class="flex-1 min-h-0 overflow-y-auto p-8 custom-scrollbar">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-slate-400 space-y-4">
                    <i class="fas fa-microscope text-6xl opacity-20"></i><p class="text-lg">Ask a question to search across literature.</p>
                </div>
                <div id="answer-container" class="hidden max-w-4xl mx-auto space-y-8 pb-12">
                    <article class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <div id="answer-text" class="text-slate-800 text-lg leading-relaxed"></div>
                    </article>
                    <div id="citations-list" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const PROVIDER_MODELS = {
            deepseek: { apiBase: "", models: [{ value: "deepseek/deepseek-chat", label: "DeepSeek V3" }, { value: "deepseek/deepseek-reasoner", label: "DeepSeek R1" }] },
            kimi: { apiBase: "https://api.moonshot.cn/v1", models: [{ value: "openai/kimi-k2.6", label: "Kimi K2.6" }] },
            custom: { apiBase: "", models: [] }
        };

        let collections = [];
        let selectedDois = new Set();
        let searchKeyword = '';
        let llmSettings = { llm: "deepseek/deepseek-chat", summary_llm: "", api_key: "", api_base: "", multimodal: 0, evidence_k: 50, max_sources: 5, prompt_template: "" };

        // DOM refs
        const askBtn = document.getElementById('ask-btn'), questionInput = document.getElementById('question'), welcomeScreen = document.getElementById('welcome-screen'), answerContainer = document.getElementById('answer-container'), answerText = document.getElementById('answer-text'), citationsList = document.getElementById('citations-list'), llmBadge = document.getElementById('llm-badge'), retrievalBadge = document.getElementById('retrieval-badge'), selectedSummary = document.getElementById('selected-summary'), clearSelectionBtn = document.getElementById('clear-selection-btn'), treeContainer = document.getElementById('tree-container'), treeSearch = document.getElementById('tree-search');
        const openSettingsBtn = document.getElementById('open-settings'), closeSettingsBtn = document.getElementById('close-settings'), settingsDrawer = document.getElementById('settings-drawer'), drawerOverlay = document.getElementById('drawer-overlay'), applySettingsBtn = document.getElementById('apply-settings'), testLlmBtn = document.getElementById('test-llm-btn'), testStatus = document.getElementById('test-status'), settingProvider = document.getElementById('setting-provider'), settingModel = document.getElementById('setting-model'), settingModelCustom = document.getElementById('setting-model-custom'), settingKey = document.getElementById('setting-key'), settingBase = document.getElementById('setting-base'), settingK = document.getElementById('setting-k'), settingSources = document.getElementById('setting-sources'), settingSummaryProvider = document.getElementById('setting-summary-provider'), settingSummaryModel = document.getElementById('setting-summary-model');
        const promptTemplateSelect = document.getElementById('prompt-template-select'), editPromptBtn = document.getElementById('edit-prompt-btn'), promptEditPanel = document.getElementById('prompt-edit-panel'), promptContentInput = document.getElementById('prompt-content-input');

        // --- Zotero Tree ---
        async function fetchCollections() {
            treeContainer.innerHTML = '<div class="text-center p-4 text-slate-400 text-xs">Loading...</div>';
            try {
                const res = await fetch('/zotero/collections');
                const data = await res.json();
                collections = data.collections; renderTree();
            } catch (err) { treeContainer.innerHTML = 'Error'; }
        }

        function renderTree() {
            treeContainer.innerHTML = '';
            const rootCollections = collections.filter(c => !c.parent_id);
            rootCollections.forEach(col => {
                const el = createCollectionEl(col);
                if (el) treeContainer.appendChild(el);
            });
        }

        function createCollectionEl(col) {
            const li = document.createElement('div');
            const items = col.items.filter(i => i.title.toLowerCase().includes(searchKeyword) || i.doi.toLowerCase().includes(searchKeyword));
            if (searchKeyword && items.length === 0) return null;

            li.innerHTML = `<div class="collection-node flex items-center py-1 px-2 hover:bg-slate-50 cursor-pointer text-sm font-medium">
                <i class="fas fa-folder text-amber-400 mr-2"></i><span>${col.name}</span>
            </div><ul class="ml-4 border-l border-slate-100 pl-2"></ul>`;
            
            const ul = li.querySelector('ul');
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'flex items-start py-1 px-2 text-[12px] hover:bg-blue-50 cursor-pointer';
                div.innerHTML = `<input type="checkbox" class="mr-2 mt-1" ${selectedDois.has(item.doi) ? 'checked' : ''}><span>${item.title}</span>`;
                div.onclick = (e) => {
                    const cb = div.querySelector('input');
                    if (e.target !== cb) cb.checked = !cb.checked;
                    if (cb.checked) selectedDois.add(item.doi); else selectedDois.delete(item.doi);
                    updateSummary();
                };
                ul.appendChild(div);
            });
            return li;
        }

        function updateSummary() {
            selectedSummary.textContent = selectedDois.size > 0 ? `Selected: ${selectedDois.size} papers` : "Auto-retrieval mode";
            retrievalBadge.textContent = selectedDois.size > 0 ? `Filter: ${selectedDois.size}` : "Auto-retrieval";
            clearSelectionBtn.classList.toggle('hidden', selectedDois.size === 0);
        }

        treeSearch.oninput = (e) => { searchKeyword = e.target.value.toLowerCase(); renderTree(); };
        clearSelectionBtn.onclick = () => { selectedDois.clear(); renderTree(); updateSummary(); };

        // --- Prompts ---
        async function loadPromptTemplates() {
            try {
                const res = await fetch('/prompts');
                const data = await res.json();
                promptTemplateSelect.innerHTML = '<option value="">— Select Template —</option>';
                data.templates.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.template;
                    opt.textContent = t.name;
                    promptTemplateSelect.appendChild(opt);
                });
                if (data.templates.length > 0) {
                    promptTemplateSelect.value = data.templates[0].template;
                    promptContentInput.value = data.templates[0].template;
                    llmSettings.prompt_template = data.templates[0].template;
                }
            } catch (e) {}
        }
        promptTemplateSelect.onchange = () => { llmSettings.prompt_template = promptContentInput.value = promptTemplateSelect.value; };
        editPromptBtn.onclick = () => promptEditPanel.classList.toggle('hidden');

        // --- Settings ---
        const closeDrawer = () => { settingsDrawer.classList.remove('open'); drawerOverlay.classList.remove('open'); };
        openSettingsBtn.onclick = () => { settingsDrawer.classList.add('open'); drawerOverlay.classList.add('open'); };
        closeSettingsBtn.onclick = drawerOverlay.onclick = closeDrawer;

        function onProviderChange() {
            const config = PROVIDER_MODELS[settingProvider.value];
            settingModel.innerHTML = config.models.map(m => `<option value="${m.value}">${m.label}</option>`).join('');
            settingBase.value = config.apiBase;
        }
        settingProvider.onchange = onProviderChange;
        applySettingsBtn.onclick = () => {
            llmSettings = { ...llmSettings, llm: settingModel.value, api_key: settingKey.value, api_base: settingBase.value, evidence_k: parseInt(settingK.value), max_sources: parseInt(settingSources.value) };
            llmBadge.textContent = `Model: ${llmSettings.llm}`;
            closeDrawer();
        };

        // --- Ask ---
        askBtn.onclick = async () => {
            const question = questionInput.value.trim(); if (!question) return;
            askBtn.disabled = true; askBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Asking...</span>';
            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, dois: selectedDois.size > 0 ? Array.from(selectedDois) : null, llm_settings: llmSettings })
                });
                const data = await res.json();
                welcomeScreen.classList.add('hidden'); answerContainer.classList.remove('hidden');
                answerText.innerHTML = marked.parse(data.answer);
                citationsList.innerHTML = data.citations.map(c => `<div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 text-xs">
                    <div class="font-bold text-blue-600 mb-2">[${c.display_index}] ${c.metadata.title || c.doc_id}</div>
                    <div class="italic text-slate-600">"${c.snippet}..."</div>
                </div>`).join('');
            } catch (err) { alert(err.message); }
            finally { askBtn.disabled = false; askBtn.innerHTML = '<i class="fas fa-search"></i><span>Ask Research Brain</span>'; }
        };

        // Init
        onProviderChange();
        loadPromptTemplates();
        fetchCollections();
    </script>
</body>
</html>
